<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome 环境工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="./assets/logo.png" alt="Chrome 环境工作台" />
        </div>

        <div class="sidebar-footer">
          <div class="stat">
            <span>环境数量</span>
            <strong id="environmentCount">0</strong>
          </div>
          <nav class="footer-nav">
            <button class="footer-icon-btn active" data-view="environments" type="button" title="环境管理">
              <span class="nav-icon">▦</span>
            </button>
            <button class="footer-icon-btn" data-view="settings" type="button" title="全局设置">
              <span class="nav-icon">⚙</span>
            </button>
            <button class="footer-icon-btn" id="themeToggleBtn" type="button" title="切换深浅主题">
              <span class="nav-icon" id="themeIcon">☀</span>
            </button>
          </nav>
        </div>
      </aside>

      <main class="content">
        <section class="view active" id="view-environments">
          <header class="page-header">
            <div>
              <h2>环境管理</h2>
              <p>创建独立 Chrome 空间，按需同步母版 Profile。</p>
            </div>
          </header>

          <section class="panel create-panel">
            <div class="panel-title">
              <h3>创建环境</h3>
              <span>一键生成独立 user-data-dir</span>
            </div>
            <form id="createForm" class="create-form">
              <label>
                <span>环境名称</span>
                <input id="envName" name="name" type="text" placeholder="例如：账号 A / 店铺 01" autocomplete="off" />
              </label>
              <label>
                <span>启动网页</span>
                <input id="envUrl" name="startUrl" type="url" placeholder="https://example.com" autocomplete="off" />
              </label>
              <label class="checkbox-row">
                <input id="copyMaster" type="checkbox" checked />
                <span>创建时同步母版Profile</span>
              </label>
              <button class="primary-btn" type="submit">创建环境</button>
            </form>
          </section>

          <section class="table-panel" id="environmentTablePanel">
            <table class="environment-table">
              <thead>
                <tr>
                  <th>环境名称</th>
                  <th>启动网页</th>
                  <th>创建时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="environmentList"></tbody>
            </table>
          </section>
          <div class="empty-state hidden" id="emptyState">
            <h3>暂无环境</h3>
            <p>先创建一个环境，再通过一键启动打开独立 Chrome 工作空间。</p>
          </div>
        </section>

        <section class="view" id="view-settings">
          <header class="page-header">
            <div>
              <h2>全局设置</h2>
              <p>配置 Chrome 程序、母版 Profile、Profile 保存路径和默认启动网页。</p>
            </div>
          </header>

          <section class="panel settings-panel">
            <div class="setting-row">
              <label>
                <span>Chrome 程序路径</span>
                <input id="chromePath" type="text" placeholder="C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe" />
              </label>
              <button class="secondary-btn" id="selectChromeBtn" type="button">选择</button>
            </div>

            <div class="setting-row">
              <label>
                <span>母版 Profile 目录</span>
                <input id="masterProfilePath" type="text" placeholder="选择一个已有 Chrome Profile 目录作为母版" />
              </label>
              <button class="secondary-btn" id="selectMasterBtn" type="button">选择</button>
            </div>

            <div class="setting-row">
              <label>
                <span>Profile 保存路径</span>
                <input id="profileStoragePath" type="text" placeholder="新建环境 profile 的保存目录" />
              </label>
              <button class="secondary-btn" id="selectStorageBtn" type="button">选择</button>
            </div>

            <label class="full-row">
              <span>默认启动网页</span>
              <input id="defaultUrl" type="url" placeholder="新环境默认打开的网址，可留空" />
            </label>

            <div class="actions">
              <button class="primary-btn" id="saveSettingsBtn" type="button">保存设置</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="toast hidden" id="toast"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
